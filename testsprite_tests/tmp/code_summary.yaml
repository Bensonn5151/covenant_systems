version: "2"
type: backend
tech_stack:
  - Python 3.10
  - FastAPI
  - Supabase Postgres
  - Groq LLM (Llama 3.3 70B)
  - sentence-transformers
  - FAISS
  - Clerk Auth (frontend)
  - Next.js 16 (frontend)
features:
  - name: Health Check
    description: System health and document layer counts
    files:
      - api/fastapi/main.py
    endpoints:
      - method: GET
        path: /health
        description: Health check with Bronze/Silver/Gold layer counts
        auth_required: false
        response_schema:
          "200": "{status, timestamp, documents: {bronze, silver, gold}}"
    depends_on: []

  - name: Regulations API
    description: List and browse regulatory documents and their sections from Supabase
    files:
      - api/fastapi/main.py
      - api/fastapi/db.py
    endpoints:
      - method: GET
        path: /api/regulations
        description: List all regulations with classification and severity breakdown
        auth_required: false
        response_schema:
          "200": "{regulations: [{id, document_type, jurisdiction, regulator, total_sections, obligations_count, prohibitions_count, definitions_count, severity_signal_breakdown}]}"
      - method: GET
        path: /api/dashboard/documents
        description: Regulation tile data for dashboard (no risk fields)
        auth_required: false
        response_schema:
          "200": "{documents: [{document_id, document_type, jurisdiction, regulator, section_count, classification_breakdown, severity_signal_breakdown}], total}"
      - method: GET
        path: /api/dashboard/documents/{document_id}
        description: Section-level detail for a regulation. Use document_id 'pipeda' for testing.
        auth_required: false
        response_schema:
          "200": "{document_id, sections: [{section_id, title, body, classification, severity_signal, operational_areas}], total_sections}"
          "404": "Document not found"
    depends_on: []

  - name: Dashboard Stats
    description: Aggregate statistics across all regulation sections
    files:
      - api/fastapi/main.py
    endpoints:
      - method: GET
        path: /api/dashboard/stats
        description: Classification and severity signal breakdown across all documents
        auth_required: false
        response_schema:
          "200": "{total_sections, total_documents, classifications, severity_signals, operational_areas, punitive_obligations}"
    depends_on: []

  - name: Sample Policies
    description: List and retrieve bundled sample policy documents for testing
    files:
      - api/fastapi/main.py
    endpoints:
      - method: GET
        path: /api/sample-policies
        description: List available sample policies
        auth_required: false
        response_schema:
          "200": "{policies: [{id, name, filename, sections_count}]}"
      - method: GET
        path: /api/sample-policies/{policy_id}
        description: Get a specific sample policy with sections. Use 'quicklend_privacy_notice' for testing.
        auth_required: false
        response_schema:
          "200": "{policy_name, filename, sections, raw_text}"
          "404": "Sample policy not found"
    depends_on: []

  - name: Single Regulation Comparison
    description: Compare a policy against one regulation using LLM reasoning or embeddings
    files:
      - api/fastapi/main.py
      - api/fastapi/compare.py
      - api/fastapi/llm_compare.py
    endpoints:
      - method: POST
        path: /api/compare
        description: Compare policy against a single regulation. Use sample_policy_id 'quicklend_privacy_notice' and regulation_id 'pipeda' for testing.
        auth_required: false
        request_schema:
          body:
            sample_policy_id: string (optional)
            policy_text: string (optional)
            regulation_id: string
            threshold: number
        response_schema:
          "200": "{score, total_obligations, covered, gaps, partial, matches, gap_details, partial_details, coverage_by_area}"
          "400": "No sections found"
          "404": "Policy or regulation not found"
    depends_on:
      - Regulations API
      - Sample Policies

  - name: Multi-Regulation Comparison (Heatmap)
    description: Compare a policy against ALL 9 regulations and return a risk heatmap grid
    files:
      - api/fastapi/main.py
      - api/fastapi/llm_compare.py
      - api/fastapi/db.py
    endpoints:
      - method: POST
        path: /api/compare-all
        description: Run policy against all regulations. Returns heatmap (8 areas x 9 regs). Use sample_policy_id 'quicklend_privacy_notice' for testing. Takes 2-3 minutes with LLM.
        auth_required: false
        request_schema:
          body:
            sample_policy_id: string (optional)
            policy_text: string (optional)
            threshold: number
        response_schema:
          "200": "{policy_id, evaluated_at, regulations[], operational_areas[], heatmap, summary, details}"
          "400": "No sections found"
    depends_on:
      - Regulations API

  - name: Semantic Search
    description: FAISS-powered semantic similarity search over regulation embeddings
    files:
      - api/fastapi/main.py
      - search/semantic_search.py
    endpoints:
      - method: GET
        path: /search
        description: Semantic search. Use query 'breach notification requirements' for testing.
        auth_required: false
        request_schema:
          query_params:
            query: string (required)
            top_k: int (default 5)
            category: string (optional)
        response_schema:
          "200": "{results: [{section_id, title, body, score, document}], query, count}"
          "500": "FAISS index not found"
    depends_on: []

  - name: Data Validation
    description: Validate storage layer integrity
    files:
      - api/fastapi/main.py
    endpoints:
      - method: GET
        path: /validate
        description: Run validation checks on Bronze/Silver/Gold layers
        auth_required: false
        response_schema:
          "200": "{valid: boolean, errors[], warnings[]}"
    depends_on: []

known_limitations:
  - issue: Multi-regulation comparison takes 2-3 minutes on Groq free tier due to rate limits
    location: api/fastapi/llm_compare.py
    impact: Users must wait with no progress indicator
  - issue: No auth enforcement on API endpoints (auth is frontend-only via Clerk)
    location: api/fastapi/main.py
    impact: API endpoints are publicly accessible
  - issue: Render free tier sleeps after 15 min inactivity (50s cold start)
    location: Dockerfile
    impact: First request after sleep is slow
