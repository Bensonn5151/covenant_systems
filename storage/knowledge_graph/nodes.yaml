- id: pipeda_s0169
  type: obligation
  source_document: pipeda
  section_number: '4.1'
  text: An organization is responsible for personal information under its control
    and shall designate an individual or individuals who are accountable for the organization’s
    compliance with the following principles.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - accountability
- id: pipeda_s0170
  type: permission
  source_document: pipeda
  section_number: 4.1.1
  text: Accountability for the organization’s compliance with the principles rests
    with the designated individual(s), even though other individuals within the organization
    may be responsible for the day-to-day collection and processing of personal information.
    In addition, other individuals within the organization may be delegated to act
    on behalf of the designated individual(s).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - accountability
- id: pipeda_s0171
  type: obligation
  source_document: pipeda
  section_number: 4.1.2
  text: The identity of the individual(s) designated by the organization to oversee
    the organization’s compliance with the principles shall be made known upon request.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0172
  type: obligation
  source_document: pipeda
  section_number: 4.1.3
  text: An organization is responsible for personal information in its possession
    or custody, including information that has been transferred to a third party for
    processing. The organization shall use contractual or other means to provide a
    comparable level of protection while the information is being processed by a third
    party.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - accountability
- id: pipeda_s0173
  type: obligation
  source_document: pipeda
  section_number: 4.1.4
  text: "Organizations shall implement policies and practices to give effect to the\
    \ principles, including \n\n(a) \n\nimplementing procedures to protect personal\
    \ information; \n\n(b) \n\nestablishing procedures to receive and respond to complaints\
    \ and inquiries; \n\n(c) \n\ntraining staff and communicating to staff information\
    \ about the organization’s policies and practices; and \n\n(d) \n\ndeveloping\
    \ information to explain the organization’s policies and procedures."
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0174
  type: obligation
  source_document: pipeda
  section_number: '4.2'
  text: The purposes for which personal information is collected shall be identified
    by the organization at or before the time the information is collected.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
- id: pipeda_s0175
  type: obligation
  source_document: pipeda
  section_number: 4.2.1
  text: The organization shall document the purposes for which per-sonal information
    is collected in order to comply with the Openness principle (Clause 4.8) and the
    Individual Access principle (Clause 4.9).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
- id: pipeda_s0176
  type: section
  source_document: pipeda
  section_number: 4.2.2
  text: Identifying the purposes for which personal information is collected at or
    before the time of collection allows organiza-tions to determine the information
    they need to collect to ful-fil these purposes. The Limiting Collection principle
    (Clause 4.4) requires an organization to collect only that information necessary
    for the purposes that have been identi-fied.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - data_collection
- id: pipeda_s0177
  type: permission
  source_document: pipeda
  section_number: 4.2.3
  text: The identified purposes should be specified at or before the time of collection
    to the individual from whom the personal information is collected. Depending upon
    the way in which the information is collected, this can be done orally or in writ-ing.
    An application form, for example, may give notice of the purposes.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 1.0
    operational_areas:
    - data_collection
- id: pipeda_s0178
  type: obligation
  source_document: pipeda
  section_number: 4.2.4
  text: When personal information that has been collected is to be used for a purpose
    not previously identified, the new purpose shall be identified prior to use. Unless
    the new purpose is re-quired by law, the consent of the individual is required
    before information can be used for that purpose. For an elaboration on consent,
    please refer to the Consent principle (Clause 4.3).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
    - data_use
- id: pipeda_s0179
  type: section
  source_document: pipeda
  section_number: 4.2.5
  text: Persons collecting personal information should be able to ex-plain to individuals
    the purposes for which the information is being collected.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - data_collection
- id: pipeda_s0180
  type: section
  source_document: pipeda
  section_number: 4.2.6
  text: This principle is linked closely to the Limiting Collection prin-ciple (Clause
    4.4) and the Limiting Use, Disclosure, and Re-tention principle (Clause 4.5).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - data_collection
    - data_disclosure
- id: pipeda_s0181
  type: permission
  source_document: pipeda
  section_number: '4.3'
  text: "The knowledge and consent of the individual are required for the collection,\
    \ use, or disclosure of personal information, ex-cept where inappropriate. \n\n\
    Note: In certain circumstances personal information can be collected, used, or\
    \ disclosed without the knowledge and consent of the individual. For example,\
    \ legal, medical, or security reasons may make it impossible or impractical to\
    \ seek consent. When information is being collected for the \n\ndetection and\
    \ prevention of fraud or for law enforcement"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.7
    operational_areas:
    - data_collection
    - consent
    - data_use
    - data_disclosure
- id: pipeda_s0182
  type: permission
  source_document: pipeda
  section_number: 4.3.1
  text: Consent is required for the collection of personal information and the subsequent
    use or disclosure of this information. Typically, an organization will seek consent
    for the use or disclosure of the information at the time of collection. In certain
    circumstances, consent with respect to use or disclosure may be sought after the
    information has been collected but before use (for example, when an organization
    wants to use information for a purpose not previously identified).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
    - data_disclosure
- id: pipeda_s0183
  type: obligation
  source_document: pipeda
  section_number: 4.3.2
  text: The principle requires “knowledge and consent”. Organizations shall make a
    reasonable effort to ensure that the individual is advised of the purposes for
    which the information will be used. To make the consent meaningful, the purposes
    must be stated in such a manner that the individual can reasonably understand
    how the information will be used or disclosed.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - consent
    - data_disclosure
- id: pipeda_s0184
  type: prohibition
  source_document: pipeda
  section_number: 4.3.3
  text: An organization shall not, as a condition of the supply of a product or service,
    require an individual to consent to the collection, use, or disclosure of information
    beyond that required to fulfil the explicitly specified, and legitimate purposes.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
    - data_disclosure
- id: pipeda_s0185
  type: obligation
  source_document: pipeda
  section_number: 4.3.4
  text: The form of the consent sought by the organization may vary, depending upon
    the circumstances and the type of information. In determining the form of consent
    to use, organizations shall take into account the sensitivity of the information.
    Although some information (for example, medical records and income records) is
    almost always considered to be sensitive, any information can be sensitive, depending
    on the context. For example, the names and addresses of subscribers to a newsmagazine
    would gen
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - consent
- id: pipeda_s0186
  type: prohibition
  source_document: pipeda
  section_number: 4.3.5
  text: In obtaining consent, the reasonable expectations of the individual are also
    relevant. For example, an individual buying a subscription to a magazine should
    reasonably expect that the organization, in addition to using the individual’s
    name and address for mailing and billing purposes, would also contact the person
    to solicit the renewal of the subscription. In this case, the organization can
    assume that the individual’s request constitutes consent for specific purposes.
    On the other hand, an in
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
- id: pipeda_s0187
  type: permission
  source_document: pipeda
  section_number: 4.3.6
  text: The way in which an organization seeks consent may vary, depending on the
    circumstances and the type of information collected. An organization should generally
    seek express consent when the information is likely to be considered sensitive.
    Implied consent would generally be appropriate when the information is less sensitive.
    Consent can also be given by an authorized representative (such as a legal guardian
    or a person having power of attorney).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
- id: pipeda_s0188
  type: permission
  source_document: pipeda
  section_number: 4.3.7
  text: "Individuals can give consent in many ways. For example: \n\n(a) \n\nan application\
    \ form may be used to seek consent, collect information, and inform the individual\
    \ of the use that will be made of the information. By completing and signing the\
    \ form, the individual is giving consent to the collection and the specified uses;\
    \ \n\n(b) \n\na checkoff box may be used to allow individuals to request that\
    \ their names and addresses not be given to other organizations. Individuals who\
    \ do not check the box are assu"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_collection
    - consent
- id: pipeda_s0189
  type: obligation
  source_document: pipeda
  section_number: 4.3.8
  text: An individual may withdraw consent at any time, subject to legal or contractual
    restrictions and reasonable notice. The organization shall inform the individual
    of the implications of such withdrawal.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - consent
- id: pipeda_s0190
  type: obligation
  source_document: pipeda
  section_number: '4.4'
  text: The collection of personal information shall be limited to that which is necessary
    for the purposes identified by the organization. Information shall be collected
    by fair and lawful means.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_collection
- id: pipeda_s0191
  type: obligation
  source_document: pipeda
  section_number: 4.4.1
  text: Organizations shall not collect personal information indiscriminately. Both
    the amount and the type of information collected shall be limited to that which
    is necessary to fulfil the purposes identified. Organizations shall specify the
    type of information collected as part of their information-handling policies and
    practices, in accordance with the Openness principle (Clause 4.8).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 0.75
    operational_areas:
    - data_collection
- id: pipeda_s0192
  type: prohibition
  source_document: pipeda
  section_number: 4.4.2
  text: The requirement that personal information be collected by fair and lawful
    means is intended to prevent organizations from collecting information by misleading
    or deceiving individuals about the purpose for which information is being collected.
    This requirement implies that consent with respect to collection must not be obtained
    through deception.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 0.8
    operational_areas:
    - data_collection
    - consent
- id: pipeda_s0193
  type: section
  source_document: pipeda
  section_number: 4.4.3
  text: This principle is linked closely to the Identifying Purposes principle (Clause
    4.2) and the Consent principle (Clause 4.3).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.4
    operational_areas:
    - consent
- id: pipeda_s0194
  type: obligation
  source_document: pipeda
  section_number: '4.5'
  text: Personal information shall not be used or disclosed for purposes other than
    those for which it was collected, except with the consent of the individual or
    as required by law. Personal information shall be retained only as long as necessary
    for the fulfilment of those purposes.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 0.75
    operational_areas:
    - data_collection
    - consent
    - data_use
    - data_disclosure
    - data_retention
- id: pipeda_s0195
  type: obligation
  source_document: pipeda
  section_number: 4.5.1
  text: Organizations using personal information for a new purpose shall document
    this purpose (see Clause 4.2.1).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0196
  type: obligation
  source_document: pipeda
  section_number: 4.5.2
  text: Organizations should develop guidelines and implement procedures with respect
    to the retention of personal information. These guidelines should include minimum
    and maximum retention periods. Personal information that has been used to make
    a decision about an individual shall be retained long enough to allow the individual
    access to the information after the decision has been made. An organization may
    be subject to legislative requirements with respect to retention periods.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_retention
- id: pipeda_s0197
  type: obligation
  source_document: pipeda
  section_number: 4.5.3
  text: Personal information that is no longer required to fulfil the identified purposes
    should be destroyed, erased, or made anonymous. Organizations shall develop guidelines
    and im-plement procedures to govern the destruction of personal information.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_retention
- id: pipeda_s0198
  type: section
  source_document: pipeda
  section_number: 4.5.4
  text: This principle is closely linked to the Consent principle (Clause 4.3), the
    Identifying Purposes principle (Clause 4.2), and the Individual Access principle
    (Clause 4.9).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.4
    operational_areas:
    - consent
- id: pipeda_s0199
  type: obligation
  source_document: pipeda
  section_number: '4.6'
  text: Personal information shall be as accurate, complete, and up-to-date as is
    necessary for the purposes for which it is to be used.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0200
  type: obligation
  source_document: pipeda
  section_number: 4.6.1
  text: The extent to which personal information shall be accurate, complete, and
    up-to-date will depend upon the use of the information, taking into account the
    interests of the individual. Information shall be sufficiently accurate, complete,
    and up-to-date to minimize the possibility that inappropriate information may
    be used to make a decision about the individual.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas: []
- id: pipeda_s0201
  type: prohibition
  source_document: pipeda
  section_number: 4.6.2
  text: An organization shall not routinely update personal information, unless such
    a process is necessary to fulfil the purposes for which the information was collected.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 1.0
    operational_areas:
    - data_collection
- id: pipeda_s0202
  type: section
  source_document: pipeda
  section_number: 4.6.3
  text: Personal information that is used on an ongoing basis, in-cluding information
    that is disclosed to third parties, should generally be accurate and up-to-date,
    unless limits to the re-quirement for accuracy are clearly set out.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - data_disclosure
- id: pipeda_s0203
  type: obligation
  source_document: pipeda
  section_number: '4.7'
  text: Personal information shall be protected by security safe-guards appropriate
    to the sensitivity of the information.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - breach_notification
- id: pipeda_s0204
  type: obligation
  source_document: pipeda
  section_number: 4.7.1
  text: The security safeguards shall protect personal information against loss or
    theft, as well as unauthorized access, disclo-sure, copying, use, or modification.
    Organizations shall pro-tect personal information regardless of the format in
    which it is held.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: high
    classification_confidence: 1.0
    operational_areas:
    - data_use
    - breach_notification
    - access_rights
- id: pipeda_s0205
  type: section
  source_document: pipeda
  section_number: 4.7.2
  text: The nature of the safeguards will vary depending on the sensitivity of the
    information that has been collected, the amount, distribution, and format of the
    information, and the method of storage. More sensitive information should be safeguarded
    by a higher level of protection. The concept of sensitivity is discussed in Clause
    4.3.4.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - data_collection
    - breach_notification
- id: pipeda_s0206
  type: section
  source_document: pipeda
  section_number: 4.7.3
  text: "The methods of protection should include \n\n(a) \n\nphysical measures, for\
    \ example, locked filing cabinets and restricted access to offices; \n\n(b) \n\
    \norganizational measures, for example, security clearances and limiting access\
    \ on a “need-to-know” basis; and \n\n(c) \n\ntechnological measures, for example,\
    \ the use of passwords and encryption."
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas: []
- id: pipeda_s0207
  type: obligation
  source_document: pipeda
  section_number: 4.7.4
  text: Organizations shall make their employees aware of the importance of maintaining
    the confidentiality of personal information.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0208
  type: obligation
  source_document: pipeda
  section_number: 4.7.5
  text: Care shall be used in the disposal or destruction of personal information,
    to prevent unauthorized parties from gaining access to the information (see Clause
    4.5.3).
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - data_retention
- id: pipeda_s0209
  type: obligation
  source_document: pipeda
  section_number: '4.8'
  text: An organization shall make readily available to individuals specific information
    about its policies and practices relating to the management of personal information.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0210
  type: obligation
  source_document: pipeda
  section_number: 4.8.1
  text: Organizations shall be open about their policies and practices with respect
    to the management of personal information. Individuals shall be able to acquire
    information about an organization’s policies and practices without unreasonable
    effort. This information shall be made available in a form that is generally understandable.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0211
  type: obligation
  source_document: pipeda
  section_number: 4.8.2
  text: "The information made available shall include \n\n(a) \n\nthe name or title,\
    \ and the address, of the person who is accountable for the organization’s policies\
    \ and practices and to whom complaints or inquiries can be forwarded; \n\n(b)\
    \ \n\nthe means of gaining access to personal information held by the organization;\
    \ \n\n(c) \n\na description of the type of personal information held by the organization,\
    \ including a general account of its use; \n\n(d) \n\na copy of any brochures\
    \ or other information that explain th"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - access_rights
    - accountability
- id: pipeda_s0212
  type: permission
  source_document: pipeda
  section_number: 4.8.3
  text: An organization may make information on its policies and practices available
    in a variety of ways. The method chosen depends on the nature of its business
    and other considera-tions. For example, an organization may choose to make brochures
    available in its place of business, mail information to its customers, provide
    online access, or establish a toll-free telephone number.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0213
  type: obligation
  source_document: pipeda
  section_number: '4.9'
  text: "Upon request, an individual shall be informed of the existence, use, and\
    \ disclosure of his or her personal information and shall be given access to that\
    \ information. An individual shall be able to challenge the accuracy and completeness\
    \ of the information and have it amended as appropriate. \n\nNote: In certain\
    \ situations, an organization may not be able to provide access to all the personal\
    \ information it holds about an individual. Exceptions to the access requirement\
    \ should be limited and specif"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_use
    - data_disclosure
    - access_rights
- id: pipeda_s0214
  type: obligation
  source_document: pipeda
  section_number: 4.9.1
  text: Upon request, an organization shall inform an individual whether or not the
    organization holds personal information about the individual. Organizations are
    encouraged to indi-cate the source of this information. The organization shall
    al-low the individual access to this information. However, the organization may
    choose to make sensitive medical information available through a medical practitioner.
    In addition, the organization shall provide an account of the use that has been
    made or is being m
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_disclosure
    - access_rights
- id: pipeda_s0215
  type: obligation
  source_document: pipeda
  section_number: 4.9.2
  text: An individual may be required to provide sufficient information to permit
    an organization to provide an account of the existence, use, and disclosure of
    personal information. The information provided shall only be used for this purpose.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_use
    - data_disclosure
- id: pipeda_s0216
  type: obligation
  source_document: pipeda
  section_number: 4.9.3
  text: "In providing an account of third parties to which it has dis-closed personal\
    \ information about an individual, an \n\norganization should attempt to be as\
    \ specific as possible. When it is not possible to provide a list of the organizations\
    \ to which it has actually disclosed information about an individual, the organization\
    \ shall provide a list of organizations to which it may have disclosed information\
    \ about the individual."
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas:
    - data_disclosure
- id: pipeda_s0217
  type: obligation
  source_document: pipeda
  section_number: 4.9.4
  text: An organization shall respond to an individual’s request within a reasonable
    time and at minimal or no cost to the individual. The requested information shall
    be provided or made available in a form that is generally understandable. For
    example, if the organization uses abbreviations or codes to record information,
    an explanation shall be provided.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0218
  type: obligation
  source_document: pipeda
  section_number: 4.9.5
  text: When an individual successfully demonstrates the inaccuracy or incompleteness
    of personal information, the organization shall amend the information as required.
    Depending upon the nature of the information challenged, amendment involves the
    correction, deletion, or addition of information. Where appropriate, the amended
    information shall be transmitted to third parties having access to the information
    in question.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0219
  type: obligation
  source_document: pipeda
  section_number: 4.9.6
  text: When a challenge is not resolved to the satisfaction of the individual, the
    substance of the unresolved challenge shall be recorded by the organization. When
    appropriate, the existence of the unresolved challenge shall be transmitted to
    third parties having access to the information in question.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0220
  type: obligation
  source_document: pipeda
  section_number: '4.10'
  text: An individual shall be able to address a challenge concerning compliance with
    the above principles to the designated individual or individuals accountable for
    the organization’s compliance.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas:
    - accountability
- id: pipeda_s0221
  type: section
  source_document: pipeda
  section_number: 4.10.1
  text: The individual accountable for an organization’s compliance is discussed in
    Clause 4.1.1.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas:
    - accountability
- id: pipeda_s0222
  type: obligation
  source_document: pipeda
  section_number: 4.10.2
  text: Organizations shall put procedures in place to receive and respond to complaints
    or inquiries about their policies and practices relating to the handling of personal
    information. The complaint procedures should be easily accessible and simple to
    use.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0223
  type: obligation
  source_document: pipeda
  section_number: 4.10.3
  text: "Organizations shall inform individuals who make inquiries or lodge complaints\
    \ of the existence of relevant complaint procedures. A range of these procedures\
    \ may exist. For example, some regulatory bodies accept complaints about the \n\
    \npersonal-information handling practices of the companies they regulate."
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 0.75
    operational_areas: []
- id: pipeda_s0224
  type: obligation
  source_document: pipeda
  section_number: 4.10.4
  text: An organization shall investigate all complaints. If a complaint is found
    to be justified, the organization shall take appropriate measures, including,
    if necessary, amending its policies and practices.
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: medium
    classification_confidence: 1.0
    operational_areas: []
- id: pipeda_s0225
  type: section
  source_document: pipeda
  section_number: '2'
  text: "(Sections 38 to 47, 49 and 51) \n\nActs of Parliament \n\nItem \n\nColumn\
    \ 1 \n\nAct of Parliament \n\nColumn 2 \n\nProvisions"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas: []
- id: pipeda_s0226
  type: section
  source_document: pipeda
  section_number: '1'
  text: "Federal Real Property and Federal Immovables Act \n\nSections 3, 5 to 7,\
    \ 11 and 16"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas: []
- id: pipeda_s0227
  type: section
  source_document: pipeda
  section_number: '2'
  text: "Canada Labour Code \n\nSubsection 254(1)"
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.3
    operational_areas: []
- id: pipeda_s0228
  type: section
  source_document: pipeda
  section_number: '3'
  text: "Canada Lands Surveys Act \n\nSubsection 3(2) \n\n2000, c. 5, Sch. 2; SOR/2004-309,\
    \ s. 1; SOR/2008-114; SOR/2019-84, s. 1."
  domains:
  - privacy
  metadata:
    jurisdiction: Canada
    risk_level: low
    classification_confidence: 0.4
    operational_areas: []
- id: pipeda_s0229
  type: section
