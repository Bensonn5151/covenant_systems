- id: pipeda_s0097
  type: section
  source_document: pipeda
  section_number: '6.1'
  text: "For the purposes of clause 4.3 of Schedule 1, the consent of an individual\
    \ is only valid if it is reasonable to expect that an individual to whom the organization’s\
    \ activities are directed would understand the nature, purpose and consequences\
    \ of the collection, use or disclosure of the personal information to which they\
    \ are consenting. \n\n2015, c. 32, s. 5. \n\nCollection without knowledge or consent"
  domains:
