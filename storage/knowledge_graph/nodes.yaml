- id: pipeda_s0086
  type: definition
  source_document: pipeda
  section_number: '4'
  text: "S.C. 2000, c. 5 \n\nAn Act to support and promote electronic commerce by\
    \ protecting personal information that is collected, used or disclosed in certain\
    \ circumstances, by providing for the use of electronic means to communicate or\
    \ record information or transactions and by amending the Canada Evidence Act,\
    \ the Statutory Instruments Act and the Statute Revision Act \n\n[Assented to\
    \ 13th April 2000] \n\nHer Majesty, by and with the advice and consent of the\
    \ Senate and House of Commons of Canada, en-acts "
  domains:
