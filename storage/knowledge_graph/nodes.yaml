- id: pipeda_s0095
  type: obligation
  source_document: pipeda
  section_number: '5'
  text: "(1) Subject to sections 6 to 9, every organization shall comply with the\
    \ obligations set out in Schedule 1. \n\nMeaning of should \n\n(2) \n\nThe word\
    \ should, when used in Schedule 1, indicates a recommendation and does not impose\
    \ an obligation. \n\nAppropriate purposes \n\n(3) \n\nAn organization may collect,\
    \ use or disclose personal information only for purposes that a reasonable person\
    \ would consider are appropriate in the circumstances. \n\nEffect of designation\
    \ of individual"
  domains:
