- id: pipeda_s0093
  type: prohibition
  source_document: pipeda
  section_number: '4.1'
  text: "4.1 (1) If a certificate under section 38.13 or 38.41 of the Canada Evidence\
    \ Act prohibiting the disclosure of personal information of a specific individual\
    \ is issued before a complaint is filed by that individual under this Part in\
    \ respect of a request for access to that information, the provisions of this\
    \ Part respecting that individual’s right of access to their personal information\
    \ do not apply to the information that is subject to the certificate. \n\nCertificate\
    \ following filing of complaint"
  domains:
  - privacy
