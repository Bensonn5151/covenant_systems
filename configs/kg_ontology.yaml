# Knowledge Graph Ontology
# Defines the schema for nodes, edges, and properties in the regulatory graph.
#
# CORE RULE
# ---------
# Regulations, sections, obligations, and prohibitions are GROUND TRUTH.
# They DO NOT own risk. Risk only exists on the `policy_implements_regulation`
# edge, where a specific company policy is evaluated against a specific
# regulatory obligation. See §13 of CLAUDE.md.

# ==========================================
# 1. Node Types (Entities)
# ==========================================
node_types:
  # --- Regulatory Entities ---
  regulation:
    description: "A full act or regulation (e.g., Bank Act)"
    properties:
      - id: string (unique)
      - title: string
      - jurisdiction: string
      - regulator: string
      - effective_date: date
      - last_amended: date (optional)

  section:
    description: "A specific section within a regulation (e.g., Section 6(1))"
    properties:
      - id: string (unique)
      - section_number: string
      - text: string (verbatim)
      - embedding: vector[384]

  definition:
    description: "A defined legal term (e.g., 'deposit-taking institution')"
    properties:
      - term: string
      - definition_text: string
      - source_section: string (ref)

  # --- Compliance Entities (derived from Silver sections) ---
  # severity_signal describes the LANGUAGE of the regulation text — it is
  # NOT a risk rating. A "punitive" signal means the text references
  # penalties/fines/imprisonment; "mandatory" means shall/must; "procedural"
  # describes filing/notice steps; "definitional" describes terms.
  obligation:
    description: "A mandatory requirement extracted from text (MUST/SHALL)"
    properties:
      - description: string
      - severity_signal: enum[definitional, procedural, mandatory, punitive]
      - penalty_text: string (optional, verbatim from source)

  prohibition:
    description: "An explicit restriction (MUST NOT/SHALL NOT)"
    properties:
      - description: string
      - severity_signal: enum[definitional, procedural, mandatory, punitive]

  permission:
    description: "An allowance or right (MAY/CAN)"
    properties:
      - description: string

  # --- Operational Entities ---
  policy:
    description: "Internal company policy document"
    properties:
      - id: string
      - title: string
      - owner: string
      - last_review: date

  policy_clause:
    description: "A single clause within a company policy document"
    properties:
      - id: string
      - title: string
      - body: string
      - parent_policy_id: string (ref)

  control:
    description: "Internal control or procedure implementing a policy"
    properties:
      - id: string
      - description: string
      - type: enum[preventative, detective, corrective]
      - frequency: enum[daily, weekly, monthly, annual]

# ==========================================
# 2. Edge Types (Relationships)
# ==========================================
edge_types:
  # --- Structural Relationships ---
  contains:
    description: "Hierarchical containment (Regulation -> Section)"
    from: [regulation, section]
    to: [section, clause]

  defines:
    description: "Section defines a term"
    from: [section]
    to: [definition]

  # --- Semantic Relationships ---
  cites:
    description: "Explicit citation (Section A mentions Section B)"
    from: [section]
    to: [section, regulation]

  requires_alignment:
    description: "Implicit dependency (e.g., Banking license requires AML compliance)"
    from: [section]
    to: [section]

  conflicts_with:
    description: "Contradictory requirements"
    from: [section, policy]
    to: [section, policy]

  # --- Compliance Mappings ---
  # `policy_implements_regulation` is the ONLY edge type in the ontology that
  # owns a risk value. Risk is relational: it exists where a specific policy
  # clause is measured against a specific regulatory obligation.
  policy_implements_regulation:
    description: "A company policy clause implements a regulatory obligation (fully, partially, or not at all)"
    from: [policy, policy_clause, control]
    to: [regulation, section, obligation, prohibition]
    properties:
      - coverage_status: enum[covered, partial, gap]
      - coverage_score: float[0.0, 1.0]   # cosine similarity
      - residual_risk: enum[low, medium, high, critical]
      - evidence_policy_section_ids: list[string]
      - confidence: float[0.0, 1.0]
      - last_evaluated: date

  mitigates:
    description: "Control reduces the residual_risk on a policy_implements_regulation edge"
    from: [control]
    to: [policy_implements_regulation]

# ==========================================
# 3. Domain Taxonomy (Tags)
# ==========================================
domains:
  - id: AML
    name: "Anti-Money Laundering"
    keywords: [laundering, terrorist financing, kyc, fintrac]

  - id: PRIVACY
    name: "Privacy & Data Protection"
    keywords: [personal information, consent, breach, pipeda]

  - id: CYBER
    name: "Cybersecurity"
    keywords: [encryption, incident response, access control]

  - id: CONSUMER
    name: "Consumer Protection"
    keywords: [disclosure, complaint, fee, fcac]
