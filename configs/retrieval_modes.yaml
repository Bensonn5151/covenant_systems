# ========================================
# Retrieval Modes Configuration
# ========================================

# Different retrieval strategies for different use cases

modes:
  # High Precision - For compliance evaluation
  precision:
    description: "Maximize precision for compliance decisions"
    pipeline:
      - stage: semantic
        top_k: 15
        weight: 0.7
      - stage: lexical
        top_k: 10
        weight: 0.3
      - stage: rerank
        model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
        top_k: 3
    score_threshold: 0.85
    use_knowledge_graph: true

  # High Recall - For research & exploration
  recall:
    description: "Cast a wide net for research tasks"
    pipeline:
      - stage: semantic
        top_k: 50
        weight: 0.5
      - stage: lexical
        top_k: 50
        weight: 0.5
      - stage: rerank
        top_k: 20
    score_threshold: 0.5
    use_knowledge_graph: true
    expand_neighbors: true

  # Balanced - Default mode
  balanced:
    description: "Balance between precision and recall"
    pipeline:
      - stage: semantic
        top_k: 20
        weight: 0.6
      - stage: lexical
        top_k: 15
        weight: 0.4
      - stage: rerank
        top_k: 10
    score_threshold: 0.7
    use_knowledge_graph: true

  # Fast - Speed-optimized
  fast:
    description: "Quick retrieval for interactive queries"
    pipeline:
      - stage: semantic
        top_k: 10
        weight: 1.0
    score_threshold: 0.65
    use_knowledge_graph: false
    cache_results: true

  # Exact Match - Keyword-focused
  exact:
    description: "Prioritize exact keyword matches"
    pipeline:
      - stage: lexical
        top_k: 30
        weight: 0.8
      - stage: semantic
        top_k: 10
        weight: 0.2
      - stage: rerank
        top_k: 10
    score_threshold: 0.6
    use_knowledge_graph: false

  # Semantic Only - Meaning-focused
  semantic_only:
    description: "Pure semantic similarity search"
    pipeline:
      - stage: semantic
        top_k: 20
        weight: 1.0
      - stage: rerank
        top_k: 10
    score_threshold: 0.75
    use_knowledge_graph: true

  # Regulatory Citation - For finding cited regulations
  citation:
    description: "Find regulations cited in documents"
    pipeline:
      - stage: lexical
        top_k: 50
        weight: 0.7
        use_patterns: true
        patterns:
          - '\b\d+\s+USC\s+\d+'
          - '\bSection\s+\d+'
          - '\b[A-Z]+\s+\d+-\d+'
      - stage: semantic
        top_k: 20
        weight: 0.3
      - stage: rerank
        top_k: 15
    score_threshold: 0.6
    use_knowledge_graph: true
    follow_citations: true

# Default mode
default_mode: balanced

# Mode selection hints
mode_hints:
  compliance_evaluation: precision
  policy_research: recall
  gap_analysis: balanced
  quick_lookup: fast
  citation_tracking: citation
  semantic_search: semantic_only